<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Error — StudentMind AI</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700;800&family=DM+Sans:ital,wght@0,300;0,400;0,500;1,300&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}" />
</head>
<body class="result-page">

  <div class="bg-mesh"></div>
  <div class="bg-grid"></div>

  <!-- NAV -->
  <nav class="navbar">
    <div class="nav-inner">
      <a href="/" class="nav-logo">
        <div class="logo-icon">
          <svg viewBox="0 0 32 32" fill="none" xmlns="http://www.w3.org/2000/svg">
            <circle cx="16" cy="16" r="14" stroke="url(#lg2)" stroke-width="2"/>
            <path d="M10 16c0-3.3 2.7-6 6-6s6 2.7 6 6" stroke="url(#lg2)" stroke-width="2" stroke-linecap="round"/>
            <circle cx="16" cy="20" r="2" fill="url(#lg2)"/>
            <path d="M16 18v-4" stroke="url(#lg2)" stroke-width="1.5" stroke-linecap="round"/>
            <defs>
              <linearGradient id="lg2" x1="4" y1="4" x2="28" y2="28">
                <stop stop-color="#6ee7f7"/><stop offset="1" stop-color="#a78bfa"/>
              </linearGradient>
            </defs>
          </svg>
        </div>
        <span class="logo-text">StudentMind<span class="logo-ai">AI</span></span>
      </a>
      <a href="/" class="nav-back-btn">← Nueva evaluación</a>
    </div>
  </nav>

  <main class="result-main">
    <div class="error-card">
      <div class="error-icon">⚠️</div>
      <h2>Error en el análisis</h2>
      <p>{{ error }}</p>
      <a href="/" class="btn-back">Volver al inicio</a>
    </div>
  </main>

  <script src="{{ url_for('static', filename='script.js') }}"></script>
</body>
</html>
